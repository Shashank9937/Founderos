services:
  - type: web
    name: founderos
    env: docker
    autoDeploy: true
    healthCheckPath: /healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_PATH
        value: /var/data/founder-os.db
    disk:
      name: founderos-data
      mountPath: /var/data
      sizeGB: 1
